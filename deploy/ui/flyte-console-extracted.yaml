apiVersion: v1
kind: ServiceAccount
metadata:
  name: flyte-console-extracted
  namespace: flyte
  labels:
    app: flyte-console-extracted
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flyte-console-extracted-dev-instances
  namespace: flyte
  labels:
    app: flyte-console-extracted
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "delete", "deletecollection"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flyte-console-extracted-dev-instances
  namespace: flyte
  labels:
    app: flyte-console-extracted
subjects:
  - kind: ServiceAccount
    name: flyte-console-extracted
    namespace: flyte
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flyte-console-extracted-dev-instances
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flyte-console-extracted
  namespace: flyte
  labels:
    app: flyte-console-extracted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flyte-console-extracted
  template:
    metadata:
      labels:
        app: flyte-console-extracted
    spec:
      serviceAccountName: flyte-console-extracted
      containers:
        - name: flyte-console-extracted
          image: flyte-console-extracted:latest
          imagePullPolicy: Never
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "8080"
            - name: NEXT_PORT
              value: "3000"
            - name: FLYTE_API_ORIGIN
              value: http://flyte-binary-http.flyte.svc.cluster.local:8090
            - name: UNION_ORG_OVERRIDE
              value: aione
            - name: EXTERNAL_API_FLYTE_ORG
              value: aione
            - name: EXTERNAL_API_DEFAULT_STORAGE_CLASS
              value: bj1-ebs
            - name: EXTERNAL_API_PUBLIC_SCHEME
              value: http
            - name: EXTERNAL_API_PUBLIC_HOST
              value: 172.19.65.230
            - name: EXTERNAL_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: flyte-console-external-api
                  key: api-keys
                  optional: true
            - name: EXTERNAL_API_DEFAULT_AUTHORIZED_KEY
              valueFrom:
                secretKeyRef:
                  name: flyte-console-external-api
                  key: authorized-key
                  optional: true
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: flyte-console-extracted
  namespace: flyte
  labels:
    app: flyte-console-extracted
spec:
  type: NodePort
  selector:
    app: flyte-console-extracted
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30081
