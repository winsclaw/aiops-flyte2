syntax = "proto3";

package flyteidl2.trainingtask;

import "buf/validate/validate.proto";
import "flyteidl2/aione/cloudstorage/cloud_storage_definition.proto";
import "flyteidl2/aione/coderepository/code_repository_definition.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/flyteorg/flyte/v2/gen/go/flyteidl2/trainingtask";

message TrainingTaskIdentifier {
  string org = 1 [(buf.validate.field).string.min_len = 1];
  string project = 2 [(buf.validate.field).string.min_len = 1];
  string domain = 3 [(buf.validate.field).string.min_len = 1];
  string id = 4 [(buf.validate.field).string.min_len = 1];
}

enum ImageType {
  IMAGE_TYPE_UNSPECIFIED = 0;
  IMAGE_TYPE_OFFICIAL = 1;
  IMAGE_TYPE_CUSTOM = 2;
}

enum TrainingTaskStatus {
  TRAINING_TASK_STATUS_UNSPECIFIED = 0;
  TRAINING_TASK_STATUS_NOT_STARTED = 1;
  TRAINING_TASK_STATUS_RUNNING = 2;
  TRAINING_TASK_STATUS_SUCCEEDED = 3;
  TRAINING_TASK_STATUS_FAILED = 4;
  TRAINING_TASK_STATUS_STOPPED = 5;
  TRAINING_TASK_STATUS_TIMED_OUT = 6;
}

message ResourceSpec {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string display_label = 2 [(buf.validate.field).string.min_len = 1];
  string cpu = 3 [(buf.validate.field).string.min_len = 1];
  string memory = 4 [(buf.validate.field).string.min_len = 1];
  uint32 gpu_count = 5;
  string gpu_model = 6;
  string bandwidth = 7;
}

message OfficialImage {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.min_len = 1];
  string image_uri = 3 [(buf.validate.field).string.min_len = 1];
}

message TrainingTask {
  TrainingTaskIdentifier id = 1 [(buf.validate.field).required = true];
  string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 128}];
  string description = 3 [(buf.validate.field).string.max_len = 255];
  ResourceSpec resource_spec = 4 [(buf.validate.field).required = true];
  string command = 5 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  uint32 max_runtime_hours = 6 [(buf.validate.field).uint32 = {gte: 1, lte: 360}];
  ImageType image_type = 7;
  string official_image_id = 8;
  string image_name = 9 [(buf.validate.field).string.min_len = 1];
  string image_uri = 10 [(buf.validate.field).string.min_len = 1];
  string creator = 11;
  string latest_run_name = 12;
  TrainingTaskStatus status = 13;
  string runtime_duration = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  google.protobuf.Timestamp started_at = 17;
  google.protobuf.Timestamp ended_at = 18;
  repeated aione.cloudstorage.CloudStorageMount cloud_storage_mounts = 19;
  repeated aione.coderepository.CodeRepositoryMount code_repository_mounts = 20;
  string status_message = 21;
}
