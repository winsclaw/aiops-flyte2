syntax = "proto3";

package flyteidl2.aione.dataset;

import "flyteidl2/aione/dataset/dataset_definition.proto";
import "flyteidl2/common/identifier.proto";
import "flyteidl2/common/list.proto";

option go_package = "github.com/flyteorg/flyte/v2/gen/go/flyteidl2/aione/dataset";

service DatasetService {
  rpc CreateDataset(CreateDatasetRequest) returns (CreateDatasetResponse) {}
  rpc UpdateDataset(UpdateDatasetRequest) returns (UpdateDatasetResponse) {}
  rpc GetDataset(GetDatasetRequest) returns (GetDatasetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc DeleteDataset(DeleteDatasetRequest) returns (DeleteDatasetResponse) {}
}

message DatasetInput {
  string name = 1;
  string description = 2;
  string endpoint = 3;
  string port = 4;
  string access_key = 5;
  string secret_key = 6;
  string target_path = 7;
  string bucket = 8;
  string bucket_path = 9;
}

message CreateDatasetRequest {
  common.ProjectIdentifier project = 1;
  DatasetInput dataset = 2;
  string creator = 3;
}

message CreateDatasetResponse {
  Dataset dataset = 1;
}

message UpdateDatasetRequest {
  DatasetIdentifier id = 1;
  DatasetInput dataset = 2;
}

message UpdateDatasetResponse {
  Dataset dataset = 1;
}

message GetDatasetRequest {
  DatasetIdentifier id = 1;
}

message GetDatasetResponse {
  Dataset dataset = 1;
}

message ListDatasetsRequest {
  common.ListRequest request = 1;
  common.ProjectIdentifier project = 2;
}

message ListDatasetsResponse {
  repeated Dataset datasets = 1;
  string token = 2;
  uint32 total = 3;
}

message DeleteDatasetRequest {
  DatasetIdentifier id = 1;
}

message DeleteDatasetResponse {}
